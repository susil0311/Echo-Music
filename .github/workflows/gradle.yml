name: Android Build

on:
  push:
    branches: [main, SK, Lyric-fix, susil0311-patch-1]
  pull_request:
    branches: [main, SK, Lyric-fix, susil0311-pqtch-1]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Decode release keystore
        run: |
          echo '${{ secrets.KEYSTORE_BASE64 }}' | base64 --decode > app/release.keystore

      - name: Create debug keystore
        run: |
          mkdir -p $HOME/.android
          keytool -genkeypair -v \
            -keystore $HOME/.android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Universal Release APK
        run: ./gradlew assembleUniversalRelease --no-daemon --no-configuration-cache
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"
          KEYSTORE_PATH: "release.keystore"
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KSP_WITH_COMPILATION_ERRORS: "true"
          KSP_ALLOW_ALL_WARNINGS_AS_ERRORS: "false"

      - name: Upload Universal Release APK
        uses: actions/upload-artifact@v4
        with:
          name: echo-music-universal-release
          path: app/build/outputs/apk/universal/release/app-universal-release.apk
