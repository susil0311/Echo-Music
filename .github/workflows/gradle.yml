name: Android Build

on:
  push:
    branches: [main, SK]
  pull_request:
    branches: [main, SK]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Generate release keystore
        run: |
          keytool -genkeypair -v \
            -keystore app/release.keystore \
            -storepass ${{ secrets.STORE_PASSWORD }} \
            -alias ${{ secrets.KEY_ALIAS }} \
            -keypass ${{ secrets.KEY_PASSWORD }} \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Echo Music,O=Echo,C=US"

      - name: Create debug keystore
        run: |
          mkdir -p $HOME/.android
          keytool -genkeypair -v \
            -keystore $HOME/.android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Universal Release APK
        run: ./gradlew assembleUniversalRelease --no-daemon --no-configuration-cache
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"
          KEYSTORE_PATH: "release.keystore"
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Universal Release APK
        uses: actions/upload-artifact@v7
        with:
          name: echo-music-universal-release
          path: app/build/outputs/apk/universal/release/app-universal-release.apk
